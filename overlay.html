<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data:;">
<style>
/* ── Reset ─────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;width:100vw;height:130px;user-select:none;-webkit-user-select:none}
#stage{position:relative;width:100%;height:130px}

/* ── Character wrapper ─────────────────────────────────── */
.cw{position:absolute;bottom:10px;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.cw:hover .sp{transform:scale(1.08);filter:brightness(1.2)}
.sp{width:52px;height:52px;image-rendering:pixelated;flex-shrink:0;transition:transform .15s,filter .3s}

/* ── Emotion glow classes ──────────────────────────────── */
.g-happy   {filter:drop-shadow(0 0 8px #FFD700)   brightness(1.1)}
.g-angry   {filter:drop-shadow(0 0 10px #FF3333)  brightness(1.1);animation:shk .11s infinite}
.g-sad     {filter:drop-shadow(0 0 8px #60A5FA)   brightness(.85)}
.g-sleepy  {filter:drop-shadow(0 0 6px #A78BFA)   brightness(.7)}
.g-excited {filter:drop-shadow(0 0 12px #34D399)  brightness(1.25);animation:bnc .3s ease-in-out infinite}
.g-love    {filter:drop-shadow(0 0 10px #FF69B4)  brightness(1.15);animation:pls .6s ease-in-out infinite}
.g-scared  {filter:drop-shadow(0 0 8px #FCD34D)   brightness(1.05);animation:shk .08s infinite}
.g-smug    {filter:drop-shadow(0 0 9px #818CF8)   brightness(1.1)}
.g-confused{filter:drop-shadow(0 0 7px #FDE68A)   brightness(1.05)}
.g-active  {filter:drop-shadow(0 0 14px rgba(255,255,255,.85)) brightness(1.3)!important}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
@keyframes bnc{0%,100%{transform:translateY(0)}50% {transform:translateY(-6px)}}
@keyframes pls{0%,100%{transform:scale(1)}         50% {transform:scale(1.06)}}

/* ── Thought bubble ─────────────────────────────────────── */
.th{
  position:absolute;bottom:70px;left:50%;
  transform:translateX(-50%) translateY(6px) scale(.9);
  background:rgba(255,255,255,.97);
  border:1.5px solid rgba(0,0,0,.1);border-radius:12px;
  padding:5px 10px;font-size:11px;font-family:'Segoe UI',Tahoma,sans-serif;
  color:#222;white-space:nowrap;
  box-shadow:0 3px 14px rgba(0,0,0,.22);pointer-events:none;
  opacity:0;transition:opacity .22s,transform .22s;z-index:99;
  max-width:200px;white-space:normal;text-align:center;line-height:1.35
}
.th.vis{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
.th::after{content:'';position:absolute;bottom:-6px;left:50%;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid rgba(255,255,255,.97);transform:translateX(-50%)}
/* Coloured bubble variants */
.th.angry  {background:#FEE2E2;border-color:#FECACA;color:#991B1B}.th.angry::after  {border-top-color:#FEE2E2}
.th.happy  {background:#FEFCE8;border-color:#FDE68A;color:#713F12}.th.happy::after  {border-top-color:#FEFCE8}
.th.sad    {background:#EFF6FF;border-color:#BFDBFE;color:#1E3A5F}.th.sad::after    {border-top-color:#EFF6FF}
.th.excited{background:#ECFDF5;border-color:#A7F3D0;color:#064E3B}.th.excited::after{border-top-color:#ECFDF5}
.th.sleepy {background:#F5F3FF;border-color:#DDD6FE;color:#4C1D95}.th.sleepy::after {border-top-color:#F5F3FF}
.th.love   {background:#FFF0F6;border-color:#FBCFE8;color:#831843}.th.love::after   {border-top-color:#FFF0F6}
.th.scared {background:#FFFBEB;border-color:#FDE68A;color:#78350F}.th.scared::after {border-top-color:#FFFBEB}
.th.smug   {background:#EDE9FE;border-color:#C4B5FD;color:#3730A3}.th.smug::after   {border-top-color:#EDE9FE}
.th.confused{background:#FFFFF0;border-color:#FDE68A;color:#713F12}.th.confused::after{border-top-color:#FFFFF0}

/* ── Typing dots inside thought bubbles ─────────────────── */
.dots span{display:inline-block;animation:db 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes db{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}

/* ── Name tag ───────────────────────────────────────────── */
.ntag{font-family:'Segoe UI',Tahoma,sans-serif;font-size:9px;font-weight:700;color:rgba(255,255,255,.9);text-shadow:0 1px 4px rgba(0,0,0,.7);margin-top:1px;letter-spacing:.8px;text-transform:uppercase}

/* ── Active ring (chat open indicator) ──────────────────── */
.ring{position:absolute;bottom:-4px;width:46px;height:3px;border-radius:2px;opacity:0;transition:opacity .3s}
.ring.vis{opacity:1}

/* ── Mouse cursor glow dot ──────────────────────────────── */
#cdot{position:absolute;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.35) 0%,transparent 70%);pointer-events:none;transform:translate(-50%,-50%);z-index:50;opacity:0;transition:opacity .2s}
#cdot.vis{opacity:1}

/* ── Conversation connect line ──────────────────────────── */
#cl{position:absolute;bottom:30px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);pointer-events:none;opacity:0;transition:opacity .4s;border-radius:1px}
#cl.vis{opacity:1}

/* ── Particle effects ───────────────────────────────────── */
.fx{position:absolute;pointer-events:none;animation:fxpop .5s ease-out forwards;z-index:100;font-size:20px}
@keyframes fxpop{0%{transform:scale(.2) rotate(-15deg);opacity:1}60%{transform:scale(1.3) rotate(8deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:0}}
.heart-p{position:absolute;pointer-events:none;animation:hfloat 1.2s ease-out forwards;font-size:12px;z-index:100}
@keyframes hfloat{0%{transform:translateY(0) scale(0);opacity:1}100%{transform:translateY(-60px) scale(1);opacity:0}}
.sweat{position:absolute;pointer-events:none;animation:sdrop .8s ease-out forwards;z-index:100;font-size:10px}
@keyframes sdrop{0%{transform:translateY(0);opacity:1}100%{transform:translateY(20px);opacity:0}}
</style>
</head>
<body>
<div id="stage">
  <div id="cl"></div>
  <div id="cdot"></div>

  <!-- Sunny (Sundram) -->
  <div class="cw" id="sunny" onclick="charClick('sunny')">
    <div class="th" id="sunny-th"><span class="dots"><span>·</span><span>·</span><span>·</span></span></div>
    <div class="ring" id="sunny-ring" style="background:#F59E0B"></div>
    <canvas class="sp" id="sunny-cv" width="52" height="52"></canvas>
    <div class="ntag" style="color:#FCD34D">Sunny</div>
  </div>

  <!-- Anku (Ankita) -->
  <div class="cw" id="anku" onclick="charClick('anku')">
    <div class="th" id="anku-th"><span class="dots"><span>·</span><span>·</span><span>·</span></span></div>
    <div class="ring" id="anku-ring" style="background:#F43F5E"></div>
    <canvas class="sp" id="anku-cv" width="52" height="52"></canvas>
    <div class="ntag" style="color:#FDA4AF">Anku</div>
  </div>

  <!-- Somu (Saumya) -->
  <div class="cw" id="somu" onclick="charClick('somu')">
    <div class="th" id="somu-th"><span class="dots"><span>·</span><span>·</span><span>·</span></span></div>
    <div class="ring" id="somu-ring" style="background:#7C3AED"></div>
    <canvas class="sp" id="somu-cv" width="52" height="52"></canvas>
    <div class="ntag" style="color:#C4B5FD">Somu</div>
  </div>
</div>

<script>
'use strict';
const S = 2; // pixel scale (52px canvas = 26x26 logical pixels)

// ═══════════════════════════════════════════════════════════
// PIXEL ART — 9 emotion expressions per character
// ═══════════════════════════════════════════════════════════

function drawSunny(ctx, fr, right, em) {
  ctx.clearRect(0, 0, 52, 52);
  ctx.save();
  if (!right) { ctx.translate(52, 0); ctx.scale(-1, 1); }
  const px = (x, y, c, a = 1) => { ctx.globalAlpha = a; ctx.fillStyle = c; ctx.fillRect(x*S, y*S, S, S); ctx.globalAlpha = 1; };

  // Body palette shifts with emotion
  const face = em === 'angry' ? '#B45309' : em === 'sad' ? '#B45309' : '#D97706';
  const head = em === 'angry' ? '#7C2D12' : '#92400E';
  const body = em === 'angry' ? '#7C2D12' : '#92400E';
  const lite = em === 'angry' ? '#B45309' : em === 'love' ? '#FF8C69' : '#D97706';

  // Antenna — tip colour signals emotion
  const atc = {happy:'#FFD700',angry:'#FF4444',sad:'#60A5FA',excited:'#34D399',love:'#FF69B4',scared:'#FCD34D',smug:'#818CF8',confused:'#FDE68A',sleepy:'#A78BFA',neutral:'#F59E0B'}[em]||'#F59E0B';
  for (let x=10;x<=13;x++) px(x, 0, atc);
  px(11,1,'#D97706'); px(12,1,'#D97706'); px(11,2,'#D97706'); px(12,2,'#D97706');

  // Head
  for (let x=4;x<=18;x++) px(x, 3, head);
  for (let x=4;x<=18;x++) for (let y=4;y<=8;y++) px(x, y, face);
  for (let x=4;x<=18;x++) px(x, 9, head);
  for (let y=4;y<=8;y++) { px(4,y,'#B45309'); px(18,y,'#B45309'); }  // ear grills

  // Eyes
  const E = (lx, rx) => {
    const draw = (ex) => {
      if      (em==='happy'||em==='love')   { [ex,ex+1,ex+2].forEach(x=>px(x,6,'#FFF')); px(ex,5,'#FFF'); px(ex+2,5,'#FFF'); }
      else if (em==='angry')  { [ex,ex+1,ex+2].forEach(x=>{px(x,5,'#FF0000');px(x,6,'#FF4444');}); px(ex,5,'#000'); px(ex+2,5,'#000'); }
      else if (em==='sad')    { [ex,ex+1].forEach(x=>{px(x,5,'#93C5FD');px(x,6,'#60A5FA');}); px(ex,7,'#60A5FA',.7); }
      else if (em==='sleepy') { [ex,ex+1,ex+2].forEach(x=>px(x,5,'#A78BFA')); [ex,ex+1].forEach(x=>px(x,6,'#6D28D9')); }
      else if (em==='excited'){ [ex,ex+2].forEach(x=>{px(x,5,'#FFD700');px(x,6,'#FFD700');}); px(ex+1,4,'#FFD700'); px(ex+1,6,'#FFD700'); }
      else if (em==='scared') { [ex,ex+1,ex+2].forEach(x=>{px(x,5,'#FFF');px(x,6,'#FFF');}); }
      else if (em==='smug')   { [ex,ex+1].forEach(x=>px(x,6,'#818CF8')); px(ex+2,5,'#818CF8'); }
      else if (em==='confused'){ [ex,ex+1,ex+2].forEach(x=>px(x,6,'#FCD34D')); px(ex,5,'#FFF'); }
      else { [ex,ex+1,ex+2].forEach(x=>px(x,5,'#FCD34D')); [ex,ex+1,ex+2].forEach(x=>px(x,6,'#F59E0B')); px(ex,5,'#FFF',.6); }
    };
    draw(lx); draw(rx);
  };
  E(6, 13);

  // Mouth
  if (em==='happy'||em==='excited'||em==='love') { for(let x=9;x<=13;x++) px(x,8,head); px(9,7,face); px(13,7,face); }
  else if (em==='angry')   { for(let x=7;x<=15;x++) px(x,8,'#FF4444'); }
  else if (em==='sad')     { for(let x=9;x<=13;x++) px(x,8,head); px(10,7,head); px(12,7,head); }
  else if (em==='scared')  { for(let x=8;x<=14;x++) px(x,8,'#FCD34D'); for(let x=9;x<=13;x++) px(x,7,'#000',.3); }
  else if (em==='smug')    { for(let x=10;x<=13;x++) px(x,8,head); px(13,7,face); }
  else if (em==='confused'){ for(let x=9;x<=12;x++) px(x,8,head); px(12,7,face); }
  else if (em==='sleepy')  { for(let x=10;x<=12;x++) px(x,8,head); }
  else                     { for(let x=9;x<=13;x++) px(x,8,head); }

  // Torso
  for (let x=3;x<=19;x++) for (let y=10;y<=14;y++) px(x,y, y%2===0?body:lite);
  // Chest badge
  const gc = {angry:'#FF4444',happy:'#FFD700',excited:'#34D399',love:'#FF69B4',scared:'#FCD34D',smug:'#818CF8',confused:'#FDE68A',sad:'#60A5FA',sleepy:'#A78BFA',neutral:'#FCD34D'}[em]||'#FCD34D';
  [9,10].forEach(x=>px(x,12,gc)); [13,14].forEach(x=>px(x,12,gc)); [11,12].forEach(x=>{px(x,11,gc);px(x,13,gc);});
  for (let x=3;x<=19;x++) px(x,14,'#78350F');  // belt

  // Arms (frame-animated swing)
  const sw = [0,1,0,-1][fr];
  for (let y=10;y<=14;y++) { px(2,y+(sw*.5|0),body); px(1,y+sw,lite); px(20,y-(sw*.5|0),body); px(21,y-sw,lite); }

  // Legs
  const lg = [0,1,0,-1][fr];
  [8,9].forEach(x  => { px(x,15,'#78350F'); px(x,15+lg,body); px(x,16+lg,lite); px(x,17+lg,'#78350F'); });
  [13,14].forEach(x => { px(x,15,'#78350F'); px(x,15-lg,body); px(x,16-lg,lite); px(x,17-lg,'#78350F'); });

  ctx.restore();
}

function drawAnku(ctx, fr, right, em) {
  ctx.clearRect(0, 0, 52, 52);
  ctx.save();
  if (!right) { ctx.translate(52, 0); ctx.scale(-1, 1); }
  const px = (x, y, c, a = 1) => { ctx.globalAlpha = a; ctx.fillStyle = c; ctx.fillRect(x*S, y*S, S, S); ctx.globalAlpha = 1; };

  const bc = {angry:'#E11D48',love:'#FF6B9D',scared:'#FB7185',excited:'#E11D48',sad:'#BE123C',sleepy:'#C2185B',smug:'#C2185B',confused:'#E91E63',neutral:'#F43F5E',happy:'#F43F5E'}[em]||'#F43F5E';
  const bwc= {happy:'#FB7185',angry:'#FF6B6B',sad:'#93C5FD',love:'#FF69B4',excited:'#34D399',scared:'#FCD34D',smug:'#A78BFA',confused:'#FDE68A',sleepy:'#DDD6FE',neutral:'#FB7185'}[em]||'#FB7185';

  // Bow hair accessory
  [7,8].forEach(x=>{px(x,0,bwc);px(x,1,bwc);}); [14,15].forEach(x=>{px(x,0,bwc);px(x,1,bwc);});
  px(11,0,'#FFF'); px(12,0,'#FFF'); px(11,1,'#FFF'); px(12,1,'#FFF');

  // Head (rounder / softer)
  [7,8,9,10,11,12,13,14,15].forEach(x=>px(x,2,'#9F1239'));
  for (let x=6;x<=16;x++) for (let y=3;y<=9;y++) px(x,y, bc);
  // Blush
  [7,8].forEach(x=>px(x,8,bwc,.65)); [14,15].forEach(x=>px(x,8,bwc,.65));

  // Eyes
  const lx=8, rx=13;
  const drawEye = (ex) => {
    if      (em==='happy'||em==='excited') { [ex,ex+1,ex+2].forEach(x=>px(x,6,'#FFF',.9)); px(ex+1,5,'#FFF'); }
    else if (em==='angry')   { [ex,ex+1,ex+2].forEach(x=>{px(x,5,'#FF0000');px(x,6,'#FF4444');}); px(ex,5,'#000'); px(ex+2,5,'#000'); }
    else if (em==='sad')     { [ex,ex+1,ex+2].forEach(x=>px(x,6,'#93C5FD',.9)); px(ex+1,7,'#60A5FA',.7); }
    else if (em==='love')    { [ex,ex+2].forEach(x=>px(x,5,bwc)); px(ex+1,6,bwc); [ex,ex+1,ex+2].forEach(x=>px(x,6,'#FF69B4')); }
    else if (em==='scared')  { [ex,ex+1,ex+2].forEach(x=>{px(x,5,'#FFF');px(x,6,'#FFF');}); }
    else if (em==='sleepy')  { [ex,ex+1,ex+2].forEach(x=>px(x,5,'#DDD6FE')); [ex,ex+1].forEach(x=>px(x,6,bc,.5)); }
    else if (em==='smug')    { [ex,ex+1].forEach(x=>px(x,6,'#FFF',.9)); px(ex+2,5,'#FFF',.9); }
    else if (em==='confused'){ [ex,ex+1,ex+2].forEach(x=>px(x,6,'#FFF',.9)); px(em==='confused'?ex:ex+2, 5,'#FFF'); }
    else { [ex,ex+1,ex+2].forEach(x=>px(x,6,'#FFF',.95)); [ex,ex+1].forEach(x=>px(x,6,'#000',.7)); px(ex+1,5,'#FFF',.4); }
  };
  drawEye(lx); drawEye(rx);

  // Mouth
  if (em==='happy'||em==='excited'||em==='love') { for(let x=9;x<=13;x++) px(x,8,'#9F1239'); px(9,7,bc); px(13,7,bc); }
  else if (em==='angry')   { for(let x=8;x<=14;x++) px(x,8,'#FF4444'); }
  else if (em==='scared')  { for(let x=9;x<=13;x++) px(x,8,'#FCD34D'); for(let x=9;x<=13;x++) px(x,7,'#000',.3); }
  else if (em==='smug')    { for(let x=11;x<=13;x++) px(x,8,'#9F1239'); px(13,7,bc); }
  else if (em==='confused'){ for(let x=9;x<=12;x++) px(x,8,'#9F1239'); px(12,7,bc); }
  else                     { for(let x=10;x<=12;x++) px(x,8,'#9F1239'); }

  // Body (slimmer / feminine)
  for (let x=7;x<=15;x++) for (let y=10;y<=14;y++) px(x,y, y===10||y===14?'#9F1239':'#BE123C');
  // Heart on chest
  const hc2 = {angry:'#FF6B6B',happy:'#FFF',excited:'#FFF',love:'#FFD700',sad:'#93C5FD',scared:'#FCD34D',smug:'#C4B5FD',confused:'#FDE68A',sleepy:'#DDD6FE',neutral:'#FFF'}[em]||'#FFF';
  [10,13].forEach(x=>px(x,11,hc2)); [11,12].forEach(x=>{px(x,10,hc2);px(x,11,hc2);px(x,12,hc2);}); [11,12].forEach(x=>px(x,13,hc2));

  // Arms
  const sw2 = [0,1,0,-1][fr];
  for (let y=10;y<=14;y++) { px(6,y+(sw2*.5|0),'#9F1239'); px(5,y+sw2,'#BE123C'); px(16,y-(sw2*.5|0),'#9F1239'); px(17,y-sw2,'#BE123C'); }

  // Legs
  const lg2 = [0,1,0,-1][fr];
  [9,10].forEach(x  => { px(x,15,'#9F1239'); px(x,16+lg2,'#BE123C'); px(x,17+lg2,'#9F1239'); });
  [12,13].forEach(x => { px(x,15,'#9F1239'); px(x,16-lg2,'#BE123C'); px(x,17-lg2,'#9F1239'); });

  ctx.restore();
}

function drawSomu(ctx, fr, right, em) {
  ctx.clearRect(0, 0, 52, 52);
  ctx.save();
  if (!right) { ctx.translate(52, 0); ctx.scale(-1, 1); }
  const px = (x, y, c, a = 1) => { ctx.globalAlpha = a; ctx.fillStyle = c; ctx.fillRect(x*S, y*S, S, S); ctx.globalAlpha = 1; };

  const bob = [0,-1,0,1][fr];
  const bo = {angry:'#DC2626',happy:'#7C3AED',sad:'#4338CA',excited:'#6D28D9',love:'#9333EA',scared:'#5B21B6',smug:'#4C1D95',confused:'#6D28D9',sleepy:'#5B21B6',neutral:'#7C3AED'}[em]||'#7C3AED';
  const bi = {angry:'#EF4444',happy:'#A78BFA',sad:'#818CF8',excited:'#C4B5FD',love:'#F0ABFC',scared:'#8B5CF6',smug:'#A78BFA',confused:'#C4B5FD',sleepy:'#8B5CF6',neutral:'#A78BFA'}[em]||'#A78BFA';
  const cc = {angry:'#FF4444',happy:'#FCD34D',excited:'#34D399',love:'#FF69B4',scared:'#FCD34D',smug:'#818CF8',confused:'#FDE68A',sad:'#60A5FA',sleepy:'#A78BFA',neutral:'#FCD34D'}[em]||'#FCD34D';

  // Crown (elegant female detail)
  [10,11,12,13,14].forEach(x=>px(x,1+bob,cc)); [9,15].forEach(x=>px(x,2+bob,cc));
  px(11,0+bob,cc); px(13,0+bob,cc);

  // Ghost body
  const innerSet = new Set([
    '9,4','10,4','11,4','12,4','13,4',
    '9,5','10,5','11,5','12,5','13,5','14,5',
    '8,6','9,6','10,6','11,6','12,6','13,6','14,6',
    '8,7','9,7','10,7','11,7','12,7','13,7','14,7',
    '8,8','9,8','10,8','11,8','12,8','13,8','14,8',
    '8,9','9,9','10,9','11,9','12,9','13,9','14,9',
    '8,10','9,10','10,10','11,10','12,10','13,10','14,10',
  ]);
  const bodyPts = [
    [9,3],[10,3],[11,3],[12,3],[13,3],
    [8,4],[9,4],[10,4],[11,4],[12,4],[13,4],[14,4],
    [7,5],[8,5],[9,5],[10,5],[11,5],[12,5],[13,5],[14,5],[15,5],
    [7,6],[8,6],[9,6],[10,6],[11,6],[12,6],[13,6],[14,6],[15,6],
    [7,7],[8,7],[9,7],[10,7],[11,7],[12,7],[13,7],[14,7],[15,7],
    [7,8],[8,8],[9,8],[10,8],[11,8],[12,8],[13,8],[14,8],[15,8],
    [7,9],[8,9],[9,9],[10,9],[11,9],[12,9],[13,9],[14,9],[15,9],
    [7,10],[8,10],[9,10],[10,10],[11,10],[12,10],[13,10],[14,10],[15,10],
  ];
  bodyPts.forEach(([x,y]) => px(x, y+bob, innerSet.has(`${x},${y}`) ? bi : bo));
  // Wavy skirt bottom
  [[7,11],[9,11],[11,11],[13,11],[15,11],[8,12],[10,12],[12,12],[14,12],[8,13],[10,13],[12,13],[14,13]].forEach(([x,y])=>px(x,y+bob,bo));

  // Eyes
  if      (em==='happy')   { [9,10,13,14].forEach(x=>px(x,7+bob,bi,.9)); [9,13].forEach(x=>px(x,6+bob,bi)); }
  else if (em==='angry')   { [8,9,10,13,14,15].forEach(x=>px(x,6+bob,'#FF4444')); [8,9,10,13,14,15].forEach(x=>px(x,7+bob,'#000')); [8,10,13,15].forEach(x=>px(x,5+bob,'#000')); }
  else if (em==='sad')     { [9,10,13,14].forEach(x=>px(x,7+bob,'#818CF8')); [9,14].forEach(x=>px(x,8+bob,'#60A5FA',.8)); }
  else if (em==='sleepy')  { [9,10,13,14].forEach(x=>px(x,6+bob,bi,.5)); px(17,3+bob,bi,.7); px(18,2+bob,bi,.6); }
  else if (em==='excited') { [9,10,13,14].forEach(x=>{px(x,6+bob,cc);px(x,7+bob,bi);}); px(11,5+bob,cc); px(13,5+bob,cc); }
  else if (em==='love')    { [9,10,13,14].forEach(x=>px(x,7+bob,'#F0ABFC')); [9,14].forEach(x=>px(x,6+bob,'#FF69B4')); }
  else if (em==='scared')  { [8,9,10,13,14,15].forEach(x=>{px(x,6+bob,bi);px(x,7+bob,bi);}); }
  else if (em==='smug')    { [9,10].forEach(x=>px(x,7+bob,bi)); px(10,6+bob,bi); [13,14].forEach(x=>px(x,7+bob,bi)); px(13,6+bob,bi,.5); }
  else if (em==='confused'){ [9,10,13,14].forEach(x=>px(x,7+bob,bi,.9)); px(9,6+bob,bi); px(15,6+bob,bi); }
  else { [9,10].forEach(x=>{px(x,7+bob,'#1E1B4B');px(x,8+bob,bi,.6);}); [13,14].forEach(x=>{px(x,7+bob,'#1E1B4B');px(x,8+bob,bi,.6);}); [8,9,14,15].forEach(x=>px(x,9+bob,'#C4B5FD',.35)); }

  // Crown sparkle
  px(17,3+bob,cc,.9); px(18,2+bob,cc,.8); px(17,2+bob,cc,.7); px(18,3+bob,cc,.6);

  ctx.restore();
}

const tTimers = {};

function showThought(id, text, dur = 2600, cls = '') {
  const c = chars[id];
  c.th.className = 'th vis' + (cls ? ' ' + cls : '');
  c.th.textContent = text;
  clearTimeout(tTimers[id]);
  tTimers[id] = setTimeout(() => c.th.classList.remove('vis'), dur);
}

function randPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randPool(id, key) { return randPick(THOUGHTS[id][key] || THOUGHTS[id].neutral); }

function setEmotion(id, em) {
  const c = chars[id];
  c.em = em; c.sm = ESM[em] || 1; c.et = 0;
  c.cv.className = 'sp' + (em !== 'neutral' ? ' g-' + em : '');
  showThought(id, randPool(id, em), 2400, em);
}

function randEm() { return randPick(EMPOOL); }

// ═══════════════════════════════════════════════════════════
// MOUSE REACTION SYSTEM
// ═══════════════════════════════════════════════════════════
let mouseX = -999, mouseY = -999, lastMX = -999, lastMY = -999;
let mouseSpeed = 0, mouseInWindow = false;
const cdot = document.getElementById('cdot');

const DIST_NOTICE = 180, DIST_CLOSE = 70, DIST_POKE = 30;

function handleMouseReactions(dt) {
  if (!mouseInWindow) {
    for (const c of Object.values(chars)) { if (c.mouseState !== 'idle') { c.mouseState = 'idle'; c.msCooldown = 0; } }
    cdot.classList.remove('vis');
    return;
  }

  cdot.style.left = mouseX + 'px';
  cdot.style.top  = mouseY + 'px';
  cdot.classList.add('vis');

  const fastSwipe = mouseSpeed > 20;

  for (const [id, c] of Object.entries(chars)) {
    if (c.stopped) continue;
    if (c.msCooldown > 0) { c.msCooldown -= dt; continue; }

    const dist = Math.hypot(mouseX - (c.x + 34), mouseY - 58);

    // Fast mouse swipe → everyone startled
    if (fastSwipe && dist < DIST_NOTICE && c.mouseState !== 'flee' && Math.random() < 0.07) {
      c.mouseState = 'flee';
      c.em = 'scared'; c.cv.className = 'sp g-scared';
      showThought(id, randPool(id, 'mouse_flee'), 1800, 'scared');
      spawnSweat(c.x);
      c.vel = Math.sign(c.x - mouseX) * 1.8;
      c.msCooldown = 3500;
      continue;
    }

    if (dist < DIST_POKE && c.mouseState !== 'poke') {
      // Direct poke
      c.mouseState = 'poke';
      if      (id === 'sunny') { c.em='excited'; c.cv.className='sp g-excited'; showThought(id,randPool(id,'mouse_close'),2200,'excited'); spawnFX(c.x+20,'⚡'); }
      else if (id === 'anku')  { c.em='love';    c.cv.className='sp g-love';    showThought(id,randPool(id,'mouse_close'),2200,'love');    spawnHearts(c.x+26); }
      else                     { c.em='excited'; c.cv.className='sp g-excited'; showThought(id,randPool(id,'mouse_close'),2200,'excited'); spawnFX(c.x+20,'✨'); }
      c.msCooldown = 2800;

    } else if (dist < DIST_CLOSE && c.mouseState !== 'close') {
      c.mouseState = 'close';
      if (id === 'sunny') { c.vel = Math.sign(mouseX - c.x) * .6; c.em='excited'; c.cv.className='sp g-excited'; showThought(id,randPool(id,'mouse_near'),2000,'excited'); }
      else if (id==='anku'){ c.em='love';  c.cv.className='sp g-love';  showThought(id,randPool(id,'mouse_near'),2000,'love'); }
      else                 { c.em='smug';  c.cv.className='sp g-smug';  showThought(id,randPool(id,'mouse_near'),2000,'smug'); }
      c.msCooldown = 2000;

    } else if (dist < DIST_NOTICE && c.mouseState === 'idle') {
      c.mouseState = 'notice';
      if      (id==='anku' && Math.random()<.5) showThought(id,randPool(id,'mouse_near'),1800,'happy');
      else if (id==='somu')                     showThought(id,'...👁',1600,'neutral');
      else if (id==='sunny' && Math.random()<.4) showThought(id,'👀',1400,'neutral');
      c.msCooldown = 1500;

    } else if (dist > DIST_NOTICE + 50 && ['notice','close','poke','flee'].includes(c.mouseState)) {
      c.mouseState = 'idle';
      c.msCooldown = 500;
    }
  }
}

// ═══════════════════════════════════════════════════════════
// PAIR INTERACTIONS
// ═══════════════════════════════════════════════════════════
let iActive = false;
const cl = document.getElementById('cl');

function doInteraction(id1, id2) {
  if (iActive) return;
  iActive = true;

  const c1 = chars[id1], c2 = chars[id2];
  const types = ['fight','fight','friendly','friendly','playful','praveen'];
  const t = randPick(types);
  const key = [id1, id2].sort().join('-');
  const bucket = (PAIR_SCRIPTS[key] || PAIR_SCRIPTS['sunny-anku'])[t] || (PAIR_SCRIPTS[key] || PAIR_SCRIPTS['sunny-anku']).friendly;
  const [say1, say2] = randPick(bucket);
  const emMap = { fight:['angry','angry'], friendly:['happy','happy'], playful:['excited','excited'], praveen:['happy','happy'] };
  const [em1, em2] = emMap[t] || ['happy','happy'];

  // Draw connect line
  cl.style.left  = (Math.min(c1.x, c2.x) + 35) + 'px';
  cl.style.width = Math.abs(c1.x - c2.x) + 'px';
  cl.classList.add('vis');

  setEmotion(id1, em1); c1.th.className = 'th vis ' + em1; c1.th.textContent = say1;

  setTimeout(() => {
    setEmotion(id2, em2); c2.th.className = 'th vis ' + em2; c2.th.textContent = say2;

    if (t === 'fight') {
      const mid = (c1.x + c2.x) / 2;
      ['💥','⚡','💢','😠','🔥'].sort(()=>Math.random()-.5).slice(0,3)
        .forEach((e,i) => setTimeout(()=>spawnFX(mid+(Math.random()-.5)*40, e), i*200));
      if (!c1.stopped) c1.vel = -Math.abs(c1.vel) * 1.5;
      if (!c2.stopped) c2.vel =  Math.abs(c2.vel) * 1.5;
    } else if (t === 'playful') {
      if (!c1.stopped) c1.vel = Math.abs(c1.vel) * 1.5 * (c2.x > c1.x ? 1 : -1);
      if (!c2.stopped) c2.vel = Math.abs(c2.vel) * 1.5 * (c1.x > c2.x ? 1 : -1);
    } else if (t === 'praveen') {
      spawnHearts(c1.x + 26); spawnHearts(c2.x + 26);
    }
  }, 950);

  // Occasionally the 3rd friend reacts
  const id3 = ['sunny','anku','somu'].find(x => x !== id1 && x !== id2);
  if (id3 && Math.random() < 0.3) {
    const c3 = chars[id3];
    const intros = {
      fight:    ['HEY STOP IT!!','...this again.','😠 BOTH OF YOU!'],
      friendly: ['Can I join? 😊','*floats over* ✨','Wait for me!!'],
      playful:  ['ME TOO!! ⚡','Interesting...','HEYYY!'],
      praveen:  ['Praveen!! 💕','He\'s lucky to have us ✨','Aww~ 😊']
    };
    setTimeout(() => {
      const em3 = t === 'fight' ? 'angry' : t === 'friendly' ? 'happy' : 'excited';
      c3.th.className = 'th vis ' + em3;
      c3.th.textContent = randPick(intros[t] || intros.friendly);
      clearTimeout(tTimers[id3]);
      tTimers[id3] = setTimeout(() => c3.th.classList.remove('vis'), 2400);
    }, 1900);
  }

  setTimeout(() => {
    cl.classList.remove('vis');
    [id1, id2].forEach(id => {
      const c = chars[id];
      c.icd = 20000;
      if (!c.stopped) c.vel = Math.sign(c.vel || 1) * .85 * (ESM[c.em] || 1);
    });
    iActive = false;
  }, 4800);
}

// Random idle thoughts
setInterval(() => {
  for (const [id, c] of Object.entries(chars)) {
    if (iActive || c.mouseState !== 'idle') continue;
    if (Math.random() < .35) showThought(id, randPool(id, c.em), 2200, c.em);
  }
}, 6000);

// ═══════════════════════════════════════════════════════════
// MAIN ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
let lastT = 0;

function animate(ts) {
  const dt = Math.min(ts - lastT, 50);
  lastT = ts;

  mouseSpeed = Math.hypot(mouseX - lastMX, mouseY - lastMY);
  lastMX = mouseX; lastMY = mouseY;

  const maxX = window.innerWidth - 72;

  handleMouseReactions(dt);

  for (const [id, c] of Object.entries(chars)) {
    // Movement
    if (!c.stopped) {
      c.x += c.vel * c.sm * (dt / 16);
      if (c.x <= 10)   { c.x = 10;   c.vel =  Math.abs(c.vel); c.face = true;  }
      if (c.x >= maxX) { c.x = maxX; c.vel = -Math.abs(c.vel); c.face = false; }
      c.face = c.vel > 0;
    }

    // Walk frame
    c.ft += dt;
    if (c.ft >= c.fd / (c.sm || 1)) { c.ft = 0; c.fr = (c.fr + 1) % 4; }

    // Render
    c.draw(c.cv.getContext('2d'), c.fr, c.face, c.em);
    c.el.style.left = c.x + 'px';

    // Emotion auto-change (only when idle)
    if (!c.stopped && c.mouseState === 'idle') {
      c.et += dt;
      if (c.et >= c.ed) {
        c.et = 0; c.ed = 8000 + Math.random() * 8000;
        if (!iActive) setEmotion(id, randEm());
      }
    }

    if (c.icd > 0) c.icd -= dt;
  }

  // Check all pairs for proximity interactions
  if (!iActive) {
    const ids = ['sunny','anku','somu'];
    outer: for (let i = 0; i < ids.length; i++) {
      for (let j = i + 1; j < ids.length; j++) {
        const a = chars[ids[i]], b = chars[ids[j]];
        if (a.icd <= 0 && b.icd <= 0 && !a.stopped && !b.stopped &&
            Math.abs(a.x - b.x) < 200 && Math.random() < 0.006) {
          doInteraction(ids[i], ids[j]);
          break outer;
        }
      }
    }
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

// ═══════════════════════════════════════════════════════════
// MOUSE TRACKING (passthrough management)
// ═══════════════════════════════════════════════════════════
document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY; mouseInWindow = true;

  let onChar = false;
  for (const c of Object.values(chars)) {
    const r = c.el.getBoundingClientRect();
    if (e.clientX >= r.left-8 && e.clientX <= r.right+8 && e.clientY >= r.top-8 && e.clientY <= r.bottom+8) {
      onChar = true; break;
    }
  }
  window.electronAPI.setIgnoreMouse(!onChar);
});

document.addEventListener('mouseleave', () => {
  mouseInWindow = false; mouseX = -999; mouseY = -999;
  cdot.classList.remove('vis');
  window.electronAPI.setIgnoreMouse(true);
});

// ═══════════════════════════════════════════════════════════
// CLICK HANDLER
// ═══════════════════════════════════════════════════════════
function charClick(id) {
  const c = chars[id];
  if (c.stopped) { window.electronAPI.openMiniChat(id, c.x); return; }

  c.stopped = true; c.vel = 0;
  c.cv.className = 'sp g-active';
  c.ring.classList.add('vis');

  const greet = { sunny:'Bhai Praveen! Kya build kar rahe ho? 🤖', anku:'PRAVEEN!! Hiii!! 💕 Miss kiya!', somu:'Praveen. ✨ Good to see you~' };
  c.th.className = 'th vis'; c.th.textContent = greet[id];
  window.electronAPI.openMiniChat(id, c.x);
}

// ═══════════════════════════════════════════════════════════
// IPC EVENT LISTENERS
// ═══════════════════════════════════════════════════════════
window.electronAPI.onChatClosed(id => {
  if (!chars[id]) return;
  const c = chars[id];
  const spd = { sunny:.9, anku:.8, somu:.6 };
  c.stopped = false;
  c.vel = spd[id] * (Math.random() > .5 ? 1 : -1);
  c.face = c.vel > 0;
  c.cv.className = 'sp' + (c.em !== 'neutral' ? ' g-' + c.em : '');
  c.ring.classList.remove('vis');
  c.th.classList.remove('vis');
});

window.electronAPI.onScreenResize(w => {
  if (chars.anku.x > w - 72) chars.anku.x = w * .48;
  if (chars.somu.x > w - 72) chars.somu.x = w * .79;
});

// ═══════════════════════════════════════════════════════════
// STARTUP SEQUENCE
// ═══════════════════════════════════════════════════════════
setTimeout(() => showThought('sunny', 'Sunny online! 🤖',   2600, 'neutral'), 800);
setTimeout(() => showThought('anku',  'Anku ready! 💕',      2600, 'neutral'), 1800);
setTimeout(() => showThought('somu',  'Somu here~ ✨',       2600, 'neutral'), 2800);
setTimeout(() => { setEmotion('sunny','happy'); setEmotion('anku','excited'); setEmotion('somu','happy'); }, 4500);
// Welcome Praveen after 8 seconds
setTimeout(() => {
  showThought('anku',  'Praveen bhai aaya!! 💕',          3200, 'love');
  setTimeout(() => showThought('sunny', 'Praveen! Let\'s build bhai! 🤖', 3000, 'excited'), 1300);
  setTimeout(() => showThought('somu',  'Welcome back Praveen ✨',         3000, 'happy'),   2500);
}, 8000);
</script>
