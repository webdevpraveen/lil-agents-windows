<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; connect-src https://api.groq.com;">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono&display=swap');
:root { --acc:#F59E0B; --bg:#0b0b14; --surf:#13131f; --bdr:#1e1e30; --text:#e2e4f0; --muted:#5a5a7a; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; border-radius:16px; border:1px solid var(--bdr); box-shadow:0 24px 64px rgba(0,0,0,.6); }
#hdr { background:var(--surf); padding:0 16px; height:56px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--bdr); flex-shrink:0; -webkit-app-region:drag; border-radius:16px 16px 0 0; }
.left { display:flex; align-items:center; gap:11px; -webkit-app-region:no-drag; }
.av { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.hi h2 { font-size:14px; font-weight:600; color:#fff; }
.hi .sub { font-size:10px; font-family:'Space Mono',monospace; color:var(--muted); margin-top:1px; }
.dot { width:7px; height:7px; border-radius:50%; background:#4ADE80; animation:pd 2s infinite; }
@keyframes pd { 0%,100%{opacity:1}50%{opacity:.5} }
.hbtns { display:flex; gap:5px; -webkit-app-region:no-drag; }
.hbtn { background:none; border:none; color:var(--muted); cursor:pointer; width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; transition:all .15s; }
.hbtn:hover { background:rgba(255,255,255,.08); color:#fff; }
.hbtn.cls:hover { background:rgba(239,68,68,.15); color:#EF4444; }
#msgs { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; scroll-behavior:smooth; }
#msgs::-webkit-scrollbar { width:3px; }
#msgs::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:2px; }
.msg { max-width:88%; padding:11px 14px; border-radius:13px; font-size:13px; line-height:1.6; word-wrap:break-word; animation:mi .2s ease-out; }
@keyframes mi { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.msg.user { background:#1a2a4a; border:1px solid rgba(59,130,246,.25); color:#c7d8f8; align-self:flex-end; border-bottom-right-radius:4px; }
.msg.ai   { background:var(--surf); border:1px solid var(--bdr); color:var(--text); align-self:flex-start; border-bottom-left-radius:4px; }
.msg.err  { background:rgba(239,68,68,.07); border:1px solid rgba(239,68,68,.2); color:#FCA5A5; font-size:12px; }
.think { align-self:flex-start; display:flex; align-items:center; gap:3px; padding:11px 14px; background:var(--surf); border:1px solid var(--bdr); border-radius:13px; border-bottom-left-radius:4px; animation:mi .2s ease-out; }
.think span { width:5px; height:5px; border-radius:50%; background:var(--acc); animation:tb 1.1s ease-in-out infinite; }
.think span:nth-child(2){animation-delay:.18s} .think span:nth-child(3){animation-delay:.36s}
@keyframes tb { 0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:1} }
#ia { padding:12px; background:var(--surf); border-top:1px solid var(--bdr); display:flex; gap:9px; align-items:flex-end; flex-shrink:0; border-radius:0 0 16px 16px; }
#mi { flex:1; background:var(--bg); border:1px solid var(--bdr); border-radius:11px; color:var(--text); padding:11px 14px; font-size:13px; font-family:'Inter',sans-serif; resize:none; min-height:42px; max-height:110px; outline:none; transition:border-color .2s; line-height:1.4; }
#mi:focus { border-color:var(--acc); }
#mi::placeholder { color:var(--muted); }
#sb { background:var(--acc); border:none; border-radius:11px; color:#000; width:42px; height:42px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; font-size:17px; font-weight:700; }
#sb:hover:not(:disabled) { filter:brightness(1.1); transform:scale(1.05); }
#sb:disabled { background:var(--bdr); color:var(--muted); cursor:not-allowed; }
</style>
</head>
<body>
<div id="hdr">
  <div class="left">
    <div class="av" id="av"></div>
    <div class="hi"><h2 id="cn">Sunny</h2><div class="sub" id="csub">groq · llama-3.1-8b · expanded chat</div></div>
    <div class="dot"></div>
  </div>
  <div class="hbtns">
    <button class="hbtn" title="Minimize" onclick="window.electronAPI.minimizeWindow()">─</button>
    <button class="hbtn cls" title="Close" onclick="window.electronAPI.closeWindow()">✕</button>
  </div>
</div>
<div id="msgs"></div>
<div id="ia">
  <textarea id="mi" placeholder="Type here... (Enter = send, Shift+Enter = new line)" rows="1"></textarea>
  <button id="sb" onclick="send()">➤</button>
</div>
<script>
'use strict';

const CHARS = {
  sunny: { e:'🤖', n:'Sunny', fn:'Sundram', a:'#F59E0B', bg:'#78350F' },
  anku:  { e:'🌸', n:'Anku',  fn:'Ankita',  a:'#F43F5E', bg:'#9F1239' },
  somu:  { e:'✨', n:'Somu',  fn:'Saumya',  a:'#7C3AED', bg:'#4C1D95' }
};

const params = new URLSearchParams(window.location.search);
const charId = params.get('char') || 'sunny';
const ch = CHARS[charId] || CHARS.sunny;

document.querySelector(':root').style.setProperty('--acc', ch.a);
document.getElementById('av').textContent = ch.e;
document.getElementById('av').style.background = ch.bg;
document.getElementById('cn').textContent = `${ch.n} (${ch.fn})`;

let msgs = [], busy = false;
const msgsEl = document.getElementById('msgs');
const inp    = document.getElementById('mi');
const sbtn   = document.getElementById('sb');

function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return d;
}
function showThink() { const d=document.createElement('div');d.id='thk';d.className='think';d.innerHTML='<span></span><span></span><span></span>';msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight; }
function hideThink() { document.getElementById('thk')?.remove(); }

async function send() {
  const text = inp.value.trim();
  if (!text || busy) return;
  inp.value = ''; inp.style.height = 'auto';
  msgs.push({ role:'user', content:text });
  addMsg('user', text);
  busy = true; sbtn.disabled = true; showThink();
  const res = await window.electronAPI.sendMessage({ messages:msgs, charId });
  hideThink(); busy = false; sbtn.disabled = false;
  if (res.success) { msgs.push({ role:'assistant', content:res.text }); addMsg('ai', res.text); }
  else addMsg('err', '⚠️ ' + res.error);
  inp.focus();
}

inp.addEventListener('input', () => { inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,110)+'px'; });
inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });

window.electronAPI.onRestoreMessages(existMsgs => {
  msgs = [...existMsgs];
  existMsgs.forEach(m => { if(m.role!=='system') addMsg(m.role, m.content); });
  inp.focus();
});

// Initial greeting when opened fresh (no restored messages)
const greet = { sunny:`Full chat open hai bhai Praveen! 🤖 Ab bata, kya chal raha hai?`, anku:`Full chat!! Yayy!! 💕 Praveen ab sab detail mein batao~`, somu:`Expanded view, Praveen. ✨ We can discuss thoroughly now.` };
addMsg('ai', greet[charId]);
inp.focus();
</script>
</body>
</html>
